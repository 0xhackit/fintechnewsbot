name: Auto-Publish Alerts (Telegram + X)

on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fintech-alerts-auto-publish
  cancel-in-progress: true

jobs:
  auto_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install feedparser requests python-dateutil python-telegram-bot requests-oauthlib
          fi

      - name: Load config and check auto_approve flag
        id: check_config
        run: |
          AUTO_APPROVE=$(python -c "import json; config = json.load(open('config.json')); print(str(config.get('alerts', {}).get('auto_approve', False)).lower())")
          POST_TELEGRAM=$(python -c "import json; config = json.load(open('config.json')); print(str(config.get('alerts', {}).get('post_to_telegram', True)).lower())")
          POST_X=$(python -c "import json; config = json.load(open('config.json')); print(str(config.get('alerts', {}).get('post_to_x', True)).lower())")

          echo "auto_approve=$AUTO_APPROVE" >> $GITHUB_OUTPUT
          echo "post_telegram=$POST_TELEGRAM" >> $GITHUB_OUTPUT
          echo "post_x=$POST_X" >> $GITHUB_OUTPUT

          echo "🔧 Config: auto_approve=$AUTO_APPROVE, post_telegram=$POST_TELEGRAM, post_x=$POST_X"

      - name: Run main pipeline (fetch + rank)
        if: steps.check_config.outputs.auto_approve == 'true'
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TREE_OF_ALPHA_API_KEY: ${{ secrets.TREE_OF_ALPHA_API_KEY }}
        run: |
          python run.py

      - name: Prepare alert drafts (with AI filter)
        if: steps.check_config.outputs.auto_approve == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_alerts.py --mode prepare

      - name: Post to Telegram
        id: post_telegram
        if: steps.check_config.outputs.auto_approve == 'true' && steps.check_config.outputs.post_telegram == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f out/alerts_drafts.json ]; then
            DRAFT_COUNT=$(python -c "import json; print(len(json.load(open('out/alerts_drafts.json'))))")
            echo "📋 Found $DRAFT_COUNT draft(s) for Telegram"

            if [ "$DRAFT_COUNT" -gt "0" ]; then
              if python post_alerts_now.py; then
                echo "✅ Successfully posted $DRAFT_COUNT alert(s) to Telegram"
              else
                echo "❌ Failed to post to Telegram"
                # Don't exit 1 here — let X posting still run
              fi
            else
              echo "📭 No new drafts to post (all items filtered or already seen)"
            fi
          else
            echo "⚠️  No drafts file found"
          fi

      - name: Post to X
        id: post_x
        if: steps.check_config.outputs.auto_approve == 'true' && steps.check_config.outputs.post_x == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          if [ -f out/alerts_drafts.json ]; then
            DRAFT_COUNT=$(python -c "import json; print(len(json.load(open('out/alerts_drafts.json'))))")
            echo "📋 Found $DRAFT_COUNT draft(s) for X"

            if [ "$DRAFT_COUNT" -gt "0" ]; then
              python scripts/publish_x.py --from-drafts
            else
              echo "📭 No drafts to post to X"
            fi
          else
            echo "ℹ️  No drafts file found"
          fi

      - name: Commit updated state
        if: steps.check_config.outputs.auto_approve == 'true'
        run: |
          git config user.name "fintech-news-bot"
          git config user.email "fintech-news-bot@users.noreply.github.com"

          git add state/seen_alerts.json state/posted_articles.db state/x_daily_count.json state/x_queue.json state/x_style_rotation.json out/items_last24h.json out/alerts_drafts.json out/feed.json out/analysis_history.json filtered_log.txt || true
          git diff --cached --quiet && echo "No state changes" && exit 0
          git commit -m "chore: update alerts state (auto-published)"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Workflow failed! Check logs above for details."
          echo "Common issues:"
          echo "  - Missing GitHub secrets (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)"
          echo "  - Telegram API errors"
          echo "  - Pipeline fetch/scoring failures"
          echo "  - Network issues"
          # TODO: Add Slack/Discord webhook notification here

      - name: Skip message
        if: steps.check_config.outputs.auto_approve != 'true'
        run: |
          echo "⏭️  Auto-approve is disabled in config.json - skipping auto-publish workflow"
          echo "💡 To enable, set 'alerts.auto_approve: true' in config.json"
